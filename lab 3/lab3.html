<!DOCTYPE html>
<html>
<head>
<title>Pental Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Welcome to Pental Shop  <span style="color: crimson;">LAB-3</span></h1>

        <h2>About This LAB</h2>

        <p>
            In this lab, You will learn basic HTML structure,
            formatting Text, Creating simple tables and using
            forms for input.
        </p>

        <!-- Table Section -->
        <table>
            <tr>
                <th>Item Name</th>
                <th>Quantity</th>
                <th>Status</th>
            </tr>

     <tr>
                <td>Pencils</td>
                <td>100</td>
                <td>In Stock</td>
            </tr>

     <tr>
                <td>Notebooks</td>
                <td>50</td>
                <td>Low Stock</td>
            </tr>

         <tr>
                <td>Markers</td>
                <td>15</td>
                <td>In Stock</td>
            </tr>
        </table>

        <!-- Contact Form -->
        <div class="contact-box">
            <h2>Contact Information</h2>

            <form>

                <div class="form-group">
                    <label>Name</label>
                    <input type="text">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email">
                </div>

                <div class="form-group">
                    <label>Message</label>
                    <textarea rows="5"></textarea>
                </div>

                <button type="submit">Submit</button>

            </form>
        </div>

    </div>

</body>
</html>
