<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h2>Student Registration Form</h2>

        <form id="studentForm">

            <div class="form-group">
                <label>
                    First Name <span class="required">*</span>
                </label>
                <input type="text" id="fname">
            </div>

            <div class="form-group">
                <label>
                    Last Name <span class="required">*</span>
                </label>
                <input type="text" id="lname">
            </div>

            <div class="form-group">
                <label>
                    Student ID <span class="required">*</span>
                </label>
                <input type="text" id="sid" placeholder="23-12345-1">
            </div>

            <div class="form-group">
                <label>
                    Email <span class="required">*</span>
                </label>
                <input type="text" id="email" placeholder="abc@student.aiub.edu">
            </div>

            <div class="form-group">
                <label>
                    Credit Completed <span class="required">*</span>
                </label>
                <input type="number" id="credit">
            </div>

            <div class="form-group">
                <label>
                    Department <span class="required">*</span>
                </label>

                <select id="department">
                    <option value="">Select Department</option>
                    <option>CSE</option>
                    <option>CS</option>
                    <option>SE</option>
                    <option>EEE</option>
                    <option>BBA</option>
                </select>

            <div class="btn">
    <button type="submit">Submit</button>
</div>

        </form>

        <p id="error" class="error"></p>

        <h2>Registered Student List</h2>

        <table id="studentTable">

            <tr>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Student ID</th>
                <th>Email</th>
                <th>Credit</th>
                <th>Department</th>
            </tr>

        </table>

    </div>

    <script src="script.js"></script>

</body>

</html>
